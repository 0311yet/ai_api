{% extends "base.html" %}
{% block title %}请求历史 - AI Gateway{% endblock %}
{% block nav_history %}nav-active{% endblock %}

{% block content %}
<div class="space-y-6">
    <h1 class="text-2xl font-bold">请求历史</h1>
    
    <!-- 筛选 -->
    <div class="bg-white p-4 rounded shadow">
        <div class="flex flex-wrap gap-3 items-end">
            <div>
                <label class="block text-xs text-gray-500 mb-1">模型</label>
                <input id="filter-model" class="border rounded px-3 py-2 text-sm" placeholder="模型名">
            </div>
            <div>
                <label class="block text-xs text-gray-500 mb-1">状态</label>
                <select id="filter-status" class="border rounded px-3 py-2 text-sm">
                    <option value="">全部</option>
                    <option value="success">成功</option>
                    <option value="failed">失败</option>
                    <option value="pending">进行中</option>
                </select>
            </div>
            <button onclick="loadHistory(1)" class="px-4 py-2 bg-blue-600 text-white rounded text-sm">查询</button>
            <button onclick="resetFilter()" class="px-4 py-2 border rounded text-sm">重置</button>
        </div>
    </div>
    
    <!-- 列表 -->
    <div class="bg-white rounded shadow overflow-hidden">
        <table class="w-full">
            <thead class="bg-gray-100">
                <tr>
                    <th class="px-4 py-3 text-left">ID</th>
                    <th class="px-4 py-3 text-left">模型</th>
                    <th class="px-4 py-3 text-left">状态</th>
                    <th class="px-4 py-3 text-right">输入Token</th>
                    <th class="px-4 py-3 text-right">输出Token</th>
                    <th class="px-4 py-3 text-right">总Token</th>
                    <th class="px-4 py-3 text-right">TTFT</th>
                    <th class="px-4 py-3 text-right">延迟</th>
                    <th class="px-4 py-3 text-left">IP</th>
                    <th class="px-4 py-3 text-left">时间</th>
                    <th class="px-4 py-3 text-left">操作</th>
                </tr>
            </thead>
            <tbody id="history-list"></tbody>
        </table>
        <div class="flex items-center justify-between px-4 py-3 border-t">
            <div class="text-sm text-gray-500" id="page-info">-</div>
            <div class="flex gap-2">
                <button onclick="prevPage()" id="btn-prev" class="px-3 py-1 border rounded text-sm disabled:opacity-50">上一页</button>
                <button onclick="nextPage()" id="btn-next" class="px-3 py-1 border rounded text-sm disabled:opacity-50">下一页</button>
            </div>
        </div>
    </div>
</div>

<!-- 详情模态框 -->
<div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-lg p-6 w-full max-w-2xl max-h-[90vh] overflow-y-auto">
        <div class="flex justify-between items-start mb-4">
            <h3 class="text-lg font-bold">请求详情</h3>
            <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600">✕</button>
        </div>
        <div id="detail-content" class="space-y-3 text-sm"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let currentPage = 1;
let total = 0;
const pageSize = 20;

async function loadHistory(page) {
    currentPage = page;
    const model = document.getElementById('filter-model').value;
    const status = document.getElementById('filter-status').value;
    
    let url = `/stats/history?page=${page}&page_size=${pageSize}`;
    if (model) url += `&model=${encodeURIComponent(model)}`;
    if (status) url += `&status=${status}`;
    
    const data = await api.get(url);
    total = data.total;
    
    const tbody = document.getElementById('history-list');
    tbody.innerHTML = '';
    if (data.logs.length === 0) {
        tbody.innerHTML = '<tr><td colspan="11" class="px-4 py-8 text-center text-gray-400">无记录</td></tr>';
    }
    
    for (const log of data.logs) {
        let statusBadge = '';
        if (log.status === 'success') statusBadge = '<span class="px-2 py-0.5 text-xs rounded bg-green-100 text-green-700">成功</span>';
        else if (log.status === 'failed') statusBadge = '<span class="px-2 py-0.5 text-xs rounded bg-red-100 text-red-700">失败</span>';
        else statusBadge = '<span class="px-2 py-0.5 text-xs rounded bg-yellow-100 text-yellow-700">进行中</span>';
        
        tbody.innerHTML += `
            <tr class="border-t hover:bg-gray-50">
                <td class="px-4 py-3 text-xs">${log.id}</td>
                <td class="px-4 py-3 text-xs font-medium">${log.model}</td>
                <td class="px-4 py-3">${statusBadge}</td>
                <td class="px-4 py-3 text-xs text-right">${formatNum(log.prompt_tokens)}</td>
                <td class="px-4 py-3 text-xs text-right">${formatNum(log.completion_tokens)}</td>
                <td class="px-4 py-3 text-xs text-right font-medium">${formatNum(log.total_tokens)}</td>
                <td class="px-4 py-3 text-xs text-right">${formatMs(log.ttft_ms)}</td>
                <td class="px-4 py-3 text-xs text-right">${formatMs(log.latency_ms)}</td>
                <td class="px-4 py-3 text-xs text-gray-500">${log.ip_address || '-'}</td>
                <td class="px-4 py-3 text-xs text-gray-500">${log.created_at ? log.created_at.replace('T', ' ').slice(0, 19) : '-'}</td>
                <td class="px-4 py-3 text-xs"><a onclick="showDetail(${log.id})" class="text-blue-600 hover:underline cursor-pointer">详情</a></td>
            </tr>`;
    }
    
    // 分页信息
    const totalPages = Math.ceil(total / pageSize) || 1;
    document.getElementById('page-info').textContent = `共 ${total} 条 / 第 ${currentPage}/${totalPages} 页`;
    document.getElementById('btn-prev').disabled = currentPage <= 1;
    document.getElementById('btn-next').disabled = currentPage >= totalPages;
}

function prevPage() { if (currentPage > 1) loadHistory(currentPage - 1); }
function nextPage() { if (currentPage * pageSize < total) loadHistory(currentPage + 1); }
function resetFilter() {
    document.getElementById('filter-model').value = '';
    document.getElementById('filter-status').value = '';
    loadHistory(1);
}

async function showDetail(id) {
    const log = await api.get(`/stats/history/${id}`);
    const c = document.getElementById('detail-content');
    
    let html = `
        <div class="grid grid-cols-2 gap-4">
            <div><span class="text-gray-500">ID:</span> ${log.id}</div>
            <div><span class="text-gray-500">请求ID:</span> <span class="font-mono text-xs">${log.request_id || '-'}</span></div>
            <div><span class="text-gray-500">模型:</span> ${log.model}</div>
            <div><span class="text-gray-500">通道ID:</span> ${log.channel_id || '-'}</div>
            <div><span class="text-gray-500">密钥ID:</span> ${log.key_id || '-'}</div>
            <div><span class="text-gray-500">状态:</span> ${log.status}</div>
            <div><span class="text-gray-500">输入Token:</span> ${log.prompt_tokens}</div>
            <div><span class="text-gray-500">输出Token:</span> ${log.completion_tokens}</div>
            <div><span class="text-gray-500">总Token:</span> ${log.total_tokens}</div>
            <div><span class="text-gray-500">延迟:</span> ${formatMs(log.latency_ms)}</div>
            <div><span class="text-gray-500">TTFT:</span> ${formatMs(log.ttft_ms)}</div>
            <div><span class="text-gray-500">IP:</span> ${log.ip_address || '-'}</div>
            <div><span class="text-gray-500">创建时间:</span> ${log.created_at ? log.created_at.replace('T', ' ').slice(0, 19) : '-'}</div>
        </div>`;
    
    if (log.error_message) {
        html += `<div><span class="text-gray-500">错误信息:</span><pre class="mt-1 bg-red-50 p-2 rounded text-xs text-red-700 whitespace-pre-wrap">${log.error_message}</pre></div>`;
    }
    
    if (log.request_body) {
        try {
            const body = JSON.parse(log.request_body);
            html += `<div><span class="text-gray-500">请求体:</span><pre class="mt-1 bg-gray-50 p-2 rounded text-xs whitespace-pre-wrap overflow-x-auto">${JSON.stringify(body, null, 2)}</pre></div>`;
        } catch {
            html += `<div><span class="text-gray-500">请求体:</span><pre class="mt-1 bg-gray-50 p-2 rounded text-xs whitespace-pre-wrap">${log.request_body}</pre></div>`;
        }
    }
    
    c.innerHTML = html;
    document.getElementById('modal').classList.remove('hidden');
    document.getElementById('modal').classList.add('flex');
}

function closeModal() {
    document.getElementById('modal').classList.add('hidden');
    document.getElementById('modal').classList.remove('flex');
}

loadHistory(1);
</script>
{% endblock %}
