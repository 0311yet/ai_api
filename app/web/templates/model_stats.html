{% extends "base.html" %}
{% block title %}模型统计 - AI Gateway{% endblock %}
{% block nav_models %}nav-active{% endblock %}

{% block content %}
<div class="space-y-6">
    <div class="flex justify-between items-center">
        <h1 class="text-2xl font-bold">模型统计</h1>
        <div class="flex gap-2">
            <button onclick="load(7)" id="btn-7" class="px-3 py-1 text-sm rounded bg-blue-600 text-white">7天</button>
            <button onclick="load(30)" id="btn-30" class="px-3 py-1 text-sm rounded bg-gray-200">30天</button>
        </div>
    </div>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="bg-white p-4 rounded shadow">
            <h2 class="text-lg font-semibold mb-4">请求次数分布</h2>
            <canvas id="chart-req" height="120"></canvas>
        </div>
        <div class="bg-white p-4 rounded shadow">
            <h2 class="text-lg font-semibold mb-4">Token用量分布</h2>
            <canvas id="chart-tokens" height="120"></canvas>
        </div>
    </div>
    
    <div class="bg-white rounded shadow overflow-hidden">
        <table class="w-full">
            <thead class="bg-gray-100">
                <tr>
                    <th class="px-4 py-3 text-left">模型</th>
                    <th class="px-4 py-3 text-right">请求数</th>
                    <th class="px-4 py-3 text-right">成功</th>
                    <th class="px-4 py-3 text-right">失败</th>
                    <th class="px-4 py-3 text-right">成功率</th>
                    <th class="px-4 py-3 text-right">输入Token</th>
                    <th class="px-4 py-3 text-right">输出Token</th>
                    <th class="px-4 py-3 text-right">平均延迟</th>
                    <th class="px-4 py-3 text-right">平均TTFT</th>
                </tr>
            </thead>
            <tbody id="model-list"></tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let chartReq, chartTokens;

async function load(days) {
    document.getElementById('btn-7').className = 'px-3 py-1 text-sm rounded ' + (days===7 ? 'bg-blue-600 text-white' : 'bg-gray-200');
    document.getElementById('btn-30').className = 'px-3 py-1 text-sm rounded ' + (days===30 ? 'bg-blue-600 text-white' : 'bg-gray-200');
    
    const data = await api.get(`/stats/models?days=${days}`);
    const tbody = document.getElementById('model-list');
    tbody.innerHTML = '';
    
    if (data.models.length === 0) {
        tbody.innerHTML = '<tr><td colspan="9" class="px-4 py-8 text-center text-gray-400">暂无数据</td></tr>';
    }
    
    for (const m of data.models) {
        const rate = m.request_count > 0 ? (m.success_count / m.request_count * 100).toFixed(1) : '0';
        tbody.innerHTML += `
            <tr class="border-t hover:bg-gray-50">
                <td class="px-4 py-3 text-sm font-medium">${m.model}</td>
                <td class="px-4 py-3 text-sm text-right">${formatNum(m.request_count)}</td>
                <td class="px-4 py-3 text-sm text-right text-green-600">${formatNum(m.success_count)}</td>
                <td class="px-4 py-3 text-sm text-right text-red-600">${formatNum(m.failed_count)}</td>
                <td class="px-4 py-3 text-sm text-right">${rate}%</td>
                <td class="px-4 py-3 text-sm text-right">${formatNum(m.prompt_tokens)}</td>
                <td class="px-4 py-3 text-sm text-right">${formatNum(m.completion_tokens)}</td>
                <td class="px-4 py-3 text-sm text-right">${formatMs(m.avg_latency_ms)}</td>
                <td class="px-4 py-3 text-sm text-right">${formatMs(m.avg_ttft_ms)}</td>
            </tr>`;
    }
    
    // 请求次数饼图
    if (chartReq) chartReq.destroy();
    chartReq = new Chart(document.getElementById('chart-req'), {
        type: 'pie',
        data: {
            labels: data.models.map(m => m.model),
            datasets: [{data: data.models.map(m => m.request_count), backgroundColor: ['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#ec4899']}]
        },
        options: {responsive: true}
    });
    
    // Token饼图
    if (chartTokens) chartTokens.destroy();
    chartTokens = new Chart(document.getElementById('chart-tokens'), {
        type: 'pie',
        data: {
            labels: data.models.map(m => m.model),
            datasets: [{data: data.models.map(m => m.total_tokens), backgroundColor: ['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#ec4899']}]
        },
        options: {responsive: true}
    });
}

load(7);
</script>
{% endblock %}
