<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Gateway{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .nav-active { background-color: rgb(59 130 246); color: white; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-2">
                    <span class="text-xl font-bold text-blue-600">AI Gateway</span>
                </div>
                <div class="flex gap-2">
                    <a href="/" class="px-3 py-2 rounded-md hover:bg-gray-100 text-sm {% block nav_dashboard %}{% endblock %}">仪表盘</a>
                    <a href="/channels" class="px-3 py-2 rounded-md hover:bg-gray-100 text-sm {% block nav_channels %}{% endblock %}">模型通道</a>
                    <a href="/keys" class="px-3 py-2 rounded-md hover:bg-gray-100 text-sm {% block nav_keys %}{% endblock %}">密钥池</a>
                    <a href="/model-stats" class="px-3 py-2 rounded-md hover:bg-gray-100 text-sm {% block nav_models %}{% endblock %}">模型统计</a>
                    <a href="/history" class="px-3 py-2 rounded-md hover:bg-gray-100 text-sm {% block nav_history %}{% endblock %}">请求历史</a>
                </div>
            </div>
        </div>
    </nav>
    
    <main class="max-w-7xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>
    
    <script>
        // 通用API请求函数
        window.api = {
            get: async (url) => {
                const r = await fetch(url);
                return r.json();
            },
            post: async (url, data) => {
                const r = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                return r.json();
            },
            put: async (url, data) => {
                const r = await fetch(url, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                return r.json();
            },
            del: async (url) => {
                const r = await fetch(url, {method: 'DELETE'});
                return r.json();
            }
        };
        
        window.formatNum = (n) => {
            if (n === null || n === undefined) return '0';
            if (n >= 1000000) return (n/1000000).toFixed(2) + 'M';
            if (n >= 1000) return (n/1000).toFixed(2) + 'K';
            return n.toString();
        };
        
        window.formatMs = (ms) => {
            if (!ms) return '0ms';
            if (ms >= 1000) return (ms/1000).toFixed(2) + 's';
            return ms.toFixed(0) + 'ms';
        };
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
