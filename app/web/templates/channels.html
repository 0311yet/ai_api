{% extends "base.html" %}
{% block title %}模型通道 - AI Gateway{% endblock %}
{% block nav_channels %}nav-active{% endblock %}

{% block content %}
<div class="space-y-6">
    <div class="flex justify-between items-center">
        <h1 class="text-2xl font-bold">模型通道</h1>
        <button onclick="showAddModal()" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">+ 添加通道</button>
    </div>
    
    <div class="bg-white rounded shadow overflow-hidden">
        <table class="w-full">
            <thead class="bg-gray-100">
                <tr>
                    <th class="px-4 py-3 text-left">ID</th>
                    <th class="px-4 py-3 text-left">名称</th>
                    <th class="px-4 py-3 text-left">厂商</th>
                    <th class="px-4 py-3 text-left">Base URL</th>
                    <th class="px-4 py-3 text-left">模型</th>
                    <th class="px-4 py-3 text-left">密钥</th>
                    <th class="px-4 py-3 text-left">状态</th>
                    <th class="px-4 py-3 text-left">操作</th>
                </tr>
            </thead>
            <tbody id="channel-list"></tbody>
        </table>
    </div>
</div>

<!-- 添加/编辑通道模态框 -->
<div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-lg p-6 w-full max-w-lg max-h-[90vh] overflow-y-auto">
        <h3 class="text-lg font-bold mb-4" id="modal-title">添加通道</h3>
        <form id="channel-form" class="space-y-3">
            <div>
                <label class="block text-sm font-medium mb-1">名称</label>
                <input name="name" class="w-full border rounded px-3 py-2" placeholder="如 openai-main">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">显示名</label>
                <input name="display_name" class="w-full border rounded px-3 py-2" placeholder="如 OpenAI主线路">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">厂商</label>
                <select name="provider" class="w-full border rounded px-3 py-2">
                    <option value="openai">OpenAI</option>
                    <option value="anthropic">Anthropic (Claude)</option>
                    <option value="google">Google (Gemini)</option>
                    <option value="local">本地/自定义(OpenAI兼容)</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Base URL</label>
                <input name="base_url" class="w-full border rounded px-3 py-2" placeholder="https://api.openai.com">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">模型列表 (逗号分隔)</label>
                <input name="models" class="w-full border rounded px-3 py-2" placeholder="gpt-4o, gpt-4o-mini">
            </div>
            <div class="flex items-center gap-4">
                <label class="flex items-center gap-2">
                    <input type="checkbox" name="is_default" class="rounded"> 默认通道(兜底)
                </label>
                <label class="flex items-center gap-2" id="active-label" style="display:none">
                    <input type="checkbox" name="is_active" class="rounded" checked> 启用
                </label>
            </div>
            <div class="flex gap-2 pt-4">
                <button type="button" onclick="closeModal()" class="px-4 py-2 border rounded">取消</button>
                <button type="button" onclick="saveChannel()" class="px-4 py-2 bg-blue-600 text-white rounded">保存</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let editingId = null;

async function loadChannels() {
    const data = await api.get('/admin/channels');
    const tbody = document.getElementById('channel-list');
    tbody.innerHTML = '';
    for (const ch of data.channels) {
        const models = (ch.models || []).join(', ');
        tbody.innerHTML += `
            <tr class="border-t hover:bg-gray-50">
                <td class="px-4 py-3 text-sm">${ch.id}</td>
                <td class="px-4 py-3 text-sm font-medium">${ch.name}${ch.is_default ? ' <span class="text-xs text-blue-500">(默认)</span>' : ''}</td>
                <td class="px-4 py-3 text-sm"><span class="px-2 py-0.5 rounded bg-gray-100 text-xs">${ch.provider}</span></td>
                <td class="px-4 py-3 text-xs text-gray-500">${ch.base_url || ''}</td>
                <td class="px-4 py-3 text-xs">${models}</td>
                <td class="px-4 py-3 text-sm">${ch.active_keys}<span class="text-gray-400">/${ch.keys_count}</span></td>
                <td class="px-4 py-3">${ch.is_active 
                    ? '<span class="px-2 py-0.5 text-xs rounded bg-green-100 text-green-700">启用</span>' 
                    : '<span class="px-2 py-0.5 text-xs rounded bg-red-100 text-red-700">禁用</span>'}</td>
                <td class="px-4 py-3 text-sm space-x-2">
                    <button onclick="editChannel(${ch.id})" class="text-blue-600 hover:underline">编辑</button>
                    <a href="/keys?channel=${ch.id}" class="text-green-600 hover:underline">密钥</a>
                    <button onclick="deleteChannel(${ch.id}, '${ch.name}')" class="text-red-600 hover:underline">删除</button>
                </td>
            </tr>`;
    }
}

function showAddModal() {
    editingId = null;
    document.getElementById('modal-title').textContent = '添加通道';
    document.getElementById('channel-form').reset();
    document.getElementById('active-label').style.display = 'none';
    document.getElementById('modal').classList.remove('hidden');
    document.getElementById('modal').classList.add('flex');
}

async function editChannel(id) {
    const data = await api.get('/admin/channels');
    const ch = data.channels.find(c => c.id === id);
    if (!ch) return;
    editingId = id;
    document.getElementById('modal-title').textContent = '编辑通道';
    const form = document.getElementById('channel-form');
    form.name.value = ch.name;
    form.display_name.value = ch.display_name || '';
    form.provider.value = ch.provider;
    form.base_url.value = ch.base_url || '';
    form.models.value = (ch.models || []).join(', ');
    form.is_default.checked = ch.is_default;
    form.is_active.checked = ch.is_active;
    document.getElementById('active-label').style.display = 'flex';
    document.getElementById('modal').classList.remove('hidden');
    document.getElementById('modal').classList.add('flex');
}

function closeModal() {
    document.getElementById('modal').classList.add('hidden');
    document.getElementById('modal').classList.remove('flex');
}

async function saveChannel() {
    const form = document.getElementById('channel-form');
    const models = form.models.value.split(',').map(s => s.trim()).filter(Boolean);
    const body = {
        name: form.name.value,
        display_name: form.display_name.value || null,
        provider: form.provider.value,
        base_url: form.base_url.value,
        models,
        is_default: form.is_default.checked,
    };
    if (editingId) {
        body.is_active = form.is_active.checked;
        await api.put(`/admin/channels/${editingId}`, body);
    } else {
        await api.post('/admin/channels', body);
    }
    closeModal();
    loadChannels();
}

async function deleteChannel(id, name) {
    if (!confirm(`确认删除通道 "${name}" ?\n关联的密钥也会被一并删除。`)) return;
    await api.del(`/admin/channels/${id}`);
    loadChannels();
}

loadChannels();
</script>
{% endblock %}
