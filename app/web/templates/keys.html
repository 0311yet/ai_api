{% extends "base.html" %}
{% block title %}密钥池 - AI Gateway{% endblock %}
{% block nav_keys %}nav-active{% endblock %}

{% block content %}
<div class="space-y-6">
    <div class="flex justify-between items-center">
        <h1 class="text-2xl font-bold">密钥池 <span class="text-sm text-gray-500 font-normal" id="current-channel"></span></h1>
        <div class="flex gap-2 items-center">
            <select id="channel-select" class="border rounded px-3 py-2" onchange="loadKeys()">
                <option value="">选择通道...</option>
            </select>
            <button id="add-btn" onclick="showAddKeyModal()" disabled class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 disabled:opacity-50">+ 添加密钥</button>
        </div>
    </div>
    
    <div id="empty-state" class="bg-white rounded shadow p-12 text-center text-gray-400">
        请选择左侧的通道来查看密钥
    </div>
    
    <div id="keys-container" class="hidden bg-white rounded shadow overflow-hidden">
        <table class="w-full">
            <thead class="bg-gray-100">
                <tr>
                    <th class="px-4 py-3 text-left">ID</th>
                    <th class="px-4 py-3 text-left">名称</th>
                    <th class="px-4 py-3 text-left">密钥预览</th>
                    <th class="px-4 py-3 text-left">权重</th>
                    <th class="px-4 py-3 text-left">使用次数</th>
                    <th class="px-4 py-3 text-left">错误次数</th>
                    <th class="px-4 py-3 text-left">最后使用</th>
                    <th class="px-4 py-3 text-left">状态</th>
                    <th class="px-4 py-3 text-left">操作</th>
                </tr>
            </thead>
            <tbody id="keys-list"></tbody>
        </table>
    </div>
</div>

<!-- 添加密钥模态框 -->
<div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-lg p-6 w-full max-w-md">
        <h3 class="text-lg font-bold mb-4">添加密钥</h3>
        <div class="space-y-3">
            <div>
                <label class="block text-sm font-medium mb-1">API密钥</label>
                <input id="key-value" type="password" class="w-full border rounded px-3 py-2" placeholder="sk-...">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">名称/备注</label>
                <input id="key-name" class="w-full border rounded px-3 py-2" placeholder="账号A">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">权重</label>
                <input id="key-weight" type="number" value="1" min="1" class="w-full border rounded px-3 py-2">
            </div>
            <div class="flex gap-2 pt-4">
                <button onclick="closeModal()" class="px-4 py-2 border rounded">取消</button>
                <button onclick="saveKey()" class="px-4 py-2 bg-blue-600 text-white rounded">保存</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let currentChannelId = null;

async function loadChannels() {
    const data = await api.get('/admin/channels');
    const select = document.getElementById('channel-select');
    const urlParams = new URLSearchParams(window.location.search);
    const presetChannel = urlParams.get('channel');
    
    select.innerHTML = '<option value="">选择通道...</option>';
    for (const ch of data.channels) {
        const opt = document.createElement('option');
        opt.value = ch.id;
        opt.textContent = `${ch.name} (${ch.provider})`;
        select.appendChild(opt);
    }
    
    if (presetChannel) {
        select.value = presetChannel;
        loadKeys();
    }
}

async function loadKeys() {
    const cid = document.getElementById('channel-select').value;
    if (!cid) {
        document.getElementById('empty-state').classList.remove('hidden');
        document.getElementById('keys-container').classList.add('hidden');
        document.getElementById('add-btn').disabled = true;
        document.getElementById('current-channel').textContent = '';
        return;
    }
    currentChannelId = cid;
    document.getElementById('add-btn').disabled = false;
    document.getElementById('empty-state').classList.add('hidden');
    document.getElementById('keys-container').classList.remove('hidden');
    
    const ch = document.getElementById('channel-select');
    document.getElementById('current-channel').textContent = `- ${ch.options[ch.selectedIndex].text}`;
    
    const data = await api.get(`/admin/channels/${cid}/keys`);
    const tbody = document.getElementById('keys-list');
    tbody.innerHTML = '';
    
    if (data.keys.length === 0) {
        tbody.innerHTML = '<tr><td colspan="9" class="px-4 py-8 text-center text-gray-400">暂无密钥</td></tr>';
        return;
    }
    
    for (const k of data.keys) {
        let status = '';
        if (k.is_blocked) status = '<span class="px-2 py-0.5 text-xs rounded bg-red-100 text-red-700">封禁</span>';
        else if (k.is_active) status = '<span class="px-2 py-0.5 text-xs rounded bg-green-100 text-green-700">启用</span>';
        else status = '<span class="px-2 py-0.5 text-xs rounded bg-gray-100 text-gray-700">禁用</span>';
        
        tbody.innerHTML += `
            <tr class="border-t hover:bg-gray-50">
                <td class="px-4 py-3 text-sm">${k.id}</td>
                <td class="px-4 py-3 text-sm">${k.name || '-'}</td>
                <td class="px-4 py-3 text-xs font-mono text-gray-500">${k.key_preview}</td>
                <td class="px-4 py-3 text-sm">${k.weight}</td>
                <td class="px-4 py-3 text-sm">${formatNum(k.request_count)}</td>
                <td class="px-4 py-3 text-sm ${k.error_count > 0 ? 'text-red-600' : ''}">${k.error_count}</td>
                <td class="px-4 py-3 text-xs text-gray-500">${k.last_used_at ? k.last_used_at.replace('T', ' ').slice(0, 19) : '-'}</td>
                <td class="px-4 py-3">${status}</td>
                <td class="px-4 py-3 text-sm space-x-2">
                    <button onclick="toggleKey(${k.id}, ${!k.is_active})" class="text-yellow-600 hover:underline">${k.is_active ? '禁用' : '启用'}</button>
                    <button onclick="deleteKey(${k.id})" class="text-red-600 hover:underline">删除</button>
                </td>
            </tr>`;
    }
}

function showAddKeyModal() {
    if (!currentChannelId) return;
    document.getElementById('key-value').value = '';
    document.getElementById('key-name').value = '';
    document.getElementById('key-weight').value = '1';
    document.getElementById('modal').classList.remove('hidden');
    document.getElementById('modal').classList.add('flex');
}

function closeModal() {
    document.getElementById('modal').classList.add('hidden');
    document.getElementById('modal').classList.remove('flex');
}

async function saveKey() {
    const body = {
        key_value: document.getElementById('key-value').value,
        name: document.getElementById('key-name').value || null,
        weight: parseInt(document.getElementById('key-weight').value) || 1,
    };
    if (!body.key_value) { alert('请输入密钥'); return; }
    await api.post(`/admin/channels/${currentChannelId}/keys`, body);
    closeModal();
    loadKeys();
}

async function toggleKey(id, active) {
    await api.put(`/admin/keys/${id}`, {is_active: active});
    loadKeys();
}

async function deleteKey(id) {
    if (!confirm('确认删除此密钥?')) return;
    await api.del(`/admin/keys/${id}`);
    loadKeys();
}

loadChannels();
</script>
{% endblock %}
