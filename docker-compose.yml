services:
  ai-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # 数据库持久化
      - ./data:/app/data
      # .env 如果需要覆盖配置（可选）
      - ./backend/.env:/app/.env:ro
    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-sk-admin-123456}
      - HOST=0.0.0.0
      - PORT=8080
      - UPSTREAM_TIMEOUT=120
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
